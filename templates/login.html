<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEngine Security | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020617;
            --accent-cyan: #22d3ee;
            --accent-rose: #f43f5e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Abstract Background Decor */
        .decor {
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
        .decor-1 { top: -100px; left: -100px; }
        .decor-2 { bottom: -100px; right: -100px; }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .header p { color: #94a3b8; font-size: 0.9rem; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 0.5rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        
        .input-group { position: relative; }
        .input-group input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.1);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-cyan);
            color: #083344;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            margin-top: 1rem;
        }
        .btn:hover { background: #67e8f9; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .error-box {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--accent-rose);
            padding: 1rem;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="decor decor-1"></div>
    <div class="decor decor-2"></div>

    <div class="login-card">
        <div class="header">
            <h1>AEngine <span style="color: var(--accent-cyan)">SEC</span></h1>
            <p>Панель управления безопасностью</p>
        </div>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            
            <div class="form-group">
                <label>Логин администратора</label>
                <div class="input-group">
                    <input type="text" name="login" placeholder="admin" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label>Пароль</label>
                <div class="input-group">
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn">Авторизоваться</button>
        </form>

        <div class="footer">
            &copy; 2026 Advanced Engine Security Suite. <br>
            Protected by AEngine Integrity Control.
        </div>
    </div>
</body>
</html>
